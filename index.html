<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>swift_type.</title>
    <link rel="icon" type="image/png" href="swifttypefavicon.png">
    <!-- Import fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=League+Spartan:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff;
            --bg-color: #000000;
            --text-fade: #a6a6a6;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'League Spartan', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .subtitle-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            opacity: 0.8;
        }

        .version {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: var(--text-fade);
            opacity: 0.8;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .timer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            font-family: 'Roboto', sans-serif;
            top: 20px;
        }

        .typing-text-wrapper {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
        }

        .typing-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 120px;
            /* Height for 3 lines */
            position: relative;
            font-size: 32px;
            line-height: 1.3;
            max-width: 900px;
            margin: 0 auto;
            overflow: hidden;
            /* Hide any overflow */
        }

        .typing-line {
            display: block;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0);
            margin-bottom: 8px;
            position: relative;
            padding: 2px 0;
        }

        .typing-line.completed {
            color: var(--text-fade);
            opacity: 0.5;
            transform: translateY(-20px);
            transition-duration: 0.8s;
        }

        .typing-line.removing {
            opacity: 0;
            transform: translateY(-40px);
            height: 0;
            margin: 0;
            transition-duration: 1s;
        }


        .keyboard {
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            margin-top: 60px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .key {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
            color: var(--bg-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .key.round {
            border-radius: 50%;
            background-color: var(--primary-color);
            border-color: transparent;
        }

        .key.square {
            border-radius: 4px;
            background-color: var(--primary-color);
            border-color: transparent;
        }

        .key.bordered {
            border-radius: 4px;
            background-color: transparent;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .key.active {
            transform: scale(0.92);
            background-color: #808080;
        }

        .stats {
            position: absolute;
            bottom: 100px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 36px;
            font-weight: bold;
        }

        .restart {
            position: absolute;
            bottom: 40px;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            animation: textBlink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .cursor {
            position: absolute;
            width: 3px;
            height: 1.15em;
            background-color: #ffffff;
            animation: blink 1s ease-in-out infinite;
            z-index: 10;
            pointer-events: none;
            transition: left 0.08s ease-out, top 0.15s ease-out;
        }

        .typing-text span {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
        }

        .results-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 120px;
            position: relative;
            margin-top: -50px;
        }

        .result-container {
            text-align: center;
        }

        .result-number {
            font-size: 96px;
            font-weight: bold;
            font-family: 'League Spartan', sans-serif;
            margin-bottom: 5px;
        }

        .result-label {
            font-size: 24px;
            font-family: 'League Spartan', sans-serif;
            color: var(--primary-color);
            text-transform: lowercase;
        }

        .divider {
            width: 2px;
            height: 160px;
            background-color: var(--primary-color);
        }

        .hidden {
            display: none;
        }

        @keyframes textBlink {

            0%,
            100% {
                color: var(--primary-color);
            }

            50% {
                color: var(--text-fade);
            }
        }

        .logo-image {
            display: none;
        }

        .loading-bar {
            width: 60%;
            height: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            margin: 20px auto;
        }

        .loading-bar-fill {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            border-radius: 4px;
            animation: loadingShimmer 1.2s ease-in-out infinite;
        }

        @keyframes loadingShimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(350%);
            }
        }

        .key-toggle {
            position: absolute;
            top: 20px;
            right: 120px;
        }

        .toggle-group {
            display: flex;
            background: #1a1a1a;
            padding: 4px;
            border-radius: 30px;
            gap: 4px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-fade);
            padding: 8px 16px;
            font-size: 14px;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
            position: relative;
            z-index: 1;
        }

        .toggle-btn.active {
            background: #2d2d2d;
            color: var(--primary-color);
        }

        .toggle-btn:hover:not(.active) {
            color: var(--primary-color);
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <div class="logo">swift_type.</div>
            <div class="subtitle-container">
                <div class="subtitle">AI-powered 15 sec typing website</div>
                <div class="version">v2.0.1</div>
            </div>
        </div>
        <div class="logo">st:]</div>
    </div>

    <div class="key-toggle">
        <div class="toggle-group">
            <button class="toggle-btn active" data-shape="round">round</button>
            <button class="toggle-btn" data-shape="square">square</button>
            <button class="toggle-btn" data-shape="bordered">bordered</button>
        </div>
    </div>

    <div class="timer" id="timer">15</div>

    <div class="main-content">
        <div class="typing-text-wrapper">
            <div class="typing-text" id="typing-text">
                <div class="loading-bar">
                    <div class="loading-bar-fill"></div>
                </div>
            </div>
            <div class="cursor" id="smooth-cursor"></div>
        </div>

        <div class="keyboard">
            <div class="keyboard-row">
                <div class="key" data-key="q">q</div>
                <div class="key" data-key="w">w</div>
                <div class="key" data-key="e">e</div>
                <div class="key" data-key="r">r</div>
                <div class="key" data-key="t">t</div>
                <div class="key" data-key="y">y</div>
                <div class="key" data-key="u">u</div>
                <div class="key" data-key="i">i</div>
                <div class="key" data-key="o">o</div>
                <div class="key" data-key="p">p</div>
            </div>
            <div class="keyboard-row">
                <div class="key" data-key="a">a</div>
                <div class="key" data-key="s">s</div>
                <div class="key" data-key="d">d</div>
                <div class="key" data-key="f">f</div>
                <div class="key" data-key="g">g</div>
                <div class="key" data-key="h">h</div>
                <div class="key" data-key="j">j</div>
                <div class="key" data-key="k">k</div>
                <div class="key" data-key="l">l</div>
            </div>
            <div class="keyboard-row">
                <div class="key" data-key="z">z</div>
                <div class="key" data-key="x">x</div>
                <div class="key" data-key="c">c</div>
                <div class="key" data-key="v">v</div>
                <div class="key" data-key="b">b</div>
                <div class="key" data-key="n">n</div>
                <div class="key" data-key="m">m</div>
            </div>
        </div>

        <div class="stats">
            <div id="wpm">0 wpm</div>
            <div id="accuracy">0% acc</div>
        </div>

        <div class="restart">press tab to restart</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // AI-Powered Text Generation and Difficulty Analysis System

            // User performance tracking
            let userPerformance = {
                averageWPM: 0,
                averageAccuracy: 0,
                difficultyLevel: 1, // 1-5 scale
                errorPatterns: {},
                weakKeys: new Set(),
                testHistory: []
            };

            // Expanded word corpus — no external dependencies
            const wordCategories = {
                easy: [
                    "the", "and", "for", "are", "but", "not", "you", "all", "can", "had",
                    "her", "was", "one", "our", "out", "day", "get", "has", "him", "his",

                    "boy", "did", "man", "men", "put", "say", "she", "too", "use", "run",
                    "big", "end", "set", "try", "ask", "own", "why", "let", "few", "got",
                    "top", "red", "air", "eye", "far", "sun", "cut", "hot", "low", "oil",
                    "sit", "add", "map", "dog", "car", "eat", "lay", "ten", "ago", "bit",
                    "job", "arm", "bed", "box", "cup", "hat", "ice", "key", "lip", "mix",
                    "net", "pay", "pin", "row", "sky", "tip", "van", "win", "yes", "zip"
                ],
                medium: [
                    "about", "after", "again", "being", "could", "every", "first", "great",
                    "house", "large", "might", "never", "other", "place", "right", "small",
                    "still", "their", "there", "these", "think", "three", "under", "water",
                    "where", "which", "while", "world", "would", "write", "years", "young",
                    "above", "below", "bring", "build", "carry", "clean", "close", "cover",
                    "cross", "dance", "drive", "earth", "eight", "enjoy", "enter", "equal",
                    "fight", "floor", "force", "front", "green", "group", "guard", "happy",
                    "heart", "heavy", "horse", "human", "image", "inner", "judge", "knife",
                    "laugh", "level", "light", "local", "magic", "match", "metal", "model",
                    "month", "moral", "music", "north", "novel", "ocean", "offer", "order",
                    "paint", "paper", "party", "peace", "phone", "plain", "plant", "plate",
                    "point", "pound", "power", "press", "price", "prime", "print", "prize",
                    "prove", "queen", "quick", "quiet", "quite", "radio", "raise", "range",
                    "reach", "ready", "river", "rough", "round", "royal", "scale", "scene",
                    "sense", "serve", "shape", "share", "sharp", "sheet", "shift", "shirt",
                    "shoot", "sight", "since", "sixth", "sixty", "sleep", "slide", "smile",
                    "smoke", "solar", "solve", "sorry", "sound", "south", "space", "spare",
                    "speak", "speed", "spend", "spoke", "sport", "squad", "stage", "stake",
                    "stand", "start", "state", "steam", "steel", "steep", "stick", "stock",
                    "stone", "store", "storm", "story", "strip", "study", "stuff", "style",
                    "sugar", "super", "sweet", "table", "taste", "teach", "theme", "thing",
                    "thumb", "tight", "title", "today", "total", "touch", "tough", "tower",
                    "track", "trade", "train", "treat", "trend", "trial", "trick", "truck",
                    "truly", "trust", "twice", "union", "unity", "until", "upper", "upset",
                    "urban", "usual", "valid", "value", "video", "visit", "vital", "vocal",
                    "voice", "waste", "watch", "wheel", "white", "whole", "worth", "wound"
                ],
                hard: [
                    "abstract", "academic", "accepted", "accident", "accurate", "achieved",
                    "actually", "advanced", "affected", "afforded", "although", "analysis",
                    "announce", "anything", "apparent", "approach", "argument", "assembly",
                    "assuming", "attached", "attitude", "audience", "balanced", "bathroom",
                    "becoming", "behavior", "believed", "birthday", "boundary", "breaking",
                    "building", "business", "calendar", "campaign", "capacity", "casualty",
                    "category", "cellphone", "chairman", "champion", "chemical", "children",
                    "circular", "climbing", "coaching", "coherent", "collapse", "colonial",
                    "combined", "comeback", "commerce", "compiled", "complete", "composed",
                    "compound", "computer", "conflict", "confused", "congress", "conquest",
                    "consider", "constant", "consumer", "contempt", "continue", "contract",
                    "contrast", "convince", "creating", "creative", "criminal", "critical",
                    "crossing", "cultural", "currency", "customer", "database", "daughter",
                    "deadline", "december", "deciding", "decision", "declined", "decoding",
                    "decrease", "defaults", "defeated", "defender", "defining", "definite",
                    "delicate", "delivery", "demanded", "departed", "deployed", "describe",
                    "designer", "detailed", "detected", "develop", "dialogue", "directed",
                    "directly", "director", "disabled", "disaster", "discount", "discover",
                    "discrete", "disorder", "dispatch", "disposal", "disposed", "distance",
                    "distinct", "district", "doctrine", "document", "domestic", "dominant",
                    "download", "dramatic", "dreadful", "dropping", "duration", "dwelling",
                    "dynamics", "earnings", "economic", "educated", "election", "electric",
                    "elephant", "elevated", "eligible", "embedded", "emerging", "emission",
                    "emotions", "emphasis", "employed", "employer", "enabling", "enclosed",
                    "encoding", "enormous", "ensuring", "entirely", "entrance", "envelope",
                    "equality", "equipped", "escalate", "escaping", "essentia", "estimate",
                    "evaluate", "eventual", "evidence", "exacting", "examined", "examiner",
                    "exceeded", "exchange", "exciting", "excluded", "exercise", "exhibits",
                    "expanded", "expected", "expedite", "expenses", "explicit", "explorer",
                    "exponent", "exported", "exposure", "extended", "external", "enormous",
                    "equipped", "football", "forecast", "feedback", "feminine", "firmware",
                    "finished", "flexible", "floating", "fortress", "fourteen", "fraction",
                    "fragment", "franklin", "freezing", "frequent", "friendly", "frontier",
                    "function", "gambling", "gathered", "generate", "genocide", "geometry",
                    "gradient", "graphics", "grasping", "grateful", "guardian", "guidance",
                    "handbook", "handling", "hardware", "harmless", "headline", "helpless",
                    "heritage", "historic", "homework", "honestly", "hopeless", "horrible",
                    "hospital", "humidity", "hundreds", "identify", "ideology", "ignorant",
                    "illusion", "imagined", "immature", "immortal", "imperial", "implicit",
                    "imported", "imposing", "improved", "incident", "included", "increase",
                    "indicate", "indirect", "industry", "infinite", "informal", "informed",
                    "inherent", "initiate", "innocent", "inspired", "instance", "integral"
                ]
            };

            // Self-contained text generation
            function generateText() {
                const difficulty = userPerformance.difficultyLevel;
                let words = [];

                if (difficulty <= 2) {
                    words = [...wordCategories.easy, ...wordCategories.medium.slice(0, 30)];
                } else if (difficulty <= 4) {
                    words = [...wordCategories.medium, ...wordCategories.hard.slice(0, 20)];
                } else {
                    words = [...wordCategories.hard, ...wordCategories.medium.slice(-30)];
                }

                // Shuffle to avoid repeating patterns
                for (let i = words.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [words[i], words[j]] = [words[j], words[i]];
                }

                const sentenceLength = Math.min(20, Math.max(10, Math.round(difficulty * 2) + Math.floor(Math.random() * 6)));
                const selectedWords = [];

                for (let i = 0; i < sentenceLength; i++) {
                    if (Math.random() < 0.3 && userPerformance.weakKeys.size > 0) {
                        const weakKey = Array.from(userPerformance.weakKeys)[Math.floor(Math.random() * userPerformance.weakKeys.size)];
                        const weakWords = words.filter(word => word.includes(weakKey));
                        if (weakWords.length > 0) {
                            selectedWords.push(weakWords[Math.floor(Math.random() * weakWords.length)]);
                        } else {
                            selectedWords.push(words[Math.floor(Math.random() * words.length)]);
                        }
                    } else {
                        selectedWords.push(words[Math.floor(Math.random() * words.length)]);
                    }
                }

                return selectedWords.join(' ');
            }

            // AI-based difficulty analysis
            function analyzeWordDifficulty(word) {
                let difficulty = 1;

                // Length factor
                if (word.length > 8) difficulty += 1;
                if (word.length > 12) difficulty += 1;

                // Character complexity
                const complexChars = /[qwertyuiopasdfghjklzxcvbnm]/g;
                const matches = word.match(complexChars);
                if (matches && matches.length > word.length * 0.7) difficulty += 1;

                // Repeated characters
                if (/(.)\1{2,}/.test(word)) difficulty += 1;

                // Uncommon letter combinations
                const uncommonCombos = ['qu', 'th', 'ch', 'sh', 'ph', 'gh', 'ck', 'ng', 'nk'];
                const hasUncommon = uncommonCombos.some(combo => word.includes(combo));
                if (hasUncommon) difficulty += 0.5;

                return Math.min(5, difficulty);
            }

            // Performance tracking and difficulty adjustment
            function updateUserPerformance(wpm, accuracy, errors) {
                userPerformance.testHistory.push({ wpm, accuracy, errors, timestamp: Date.now() });

                // Keep only last 10 tests
                if (userPerformance.testHistory.length > 10) {
                    userPerformance.testHistory.shift();
                }

                // Calculate averages
                const recentTests = userPerformance.testHistory.slice(-5);
                userPerformance.averageWPM = recentTests.reduce((sum, test) => sum + test.wpm, 0) / recentTests.length;
                userPerformance.averageAccuracy = recentTests.reduce((sum, test) => sum + test.accuracy, 0) / recentTests.length;

                // Adjust difficulty based on performance
                if (userPerformance.averageWPM > 60 && userPerformance.averageAccuracy > 95) {
                    userPerformance.difficultyLevel = Math.min(5, userPerformance.difficultyLevel + 0.2);
                } else if (userPerformance.averageWPM < 30 || userPerformance.averageAccuracy < 80) {
                    userPerformance.difficultyLevel = Math.max(1, userPerformance.difficultyLevel - 0.3);
                }

                // Track error patterns
                if (errors) {
                    errors.forEach(error => {
                        userPerformance.errorPatterns[error] = (userPerformance.errorPatterns[error] || 0) + 1;
                        if (userPerformance.errorPatterns[error] > 3) {
                            userPerformance.weakKeys.add(error);
                        }
                    });
                }
            }

            let currentSentence = '';
            let currentInput = '';
            let startTime = null;
            let isTestActive = false;
            let timer = null;
            let timeLeft = 15;
            let errorChars = [];

            const typingText = document.getElementById('typing-text');
            const wpmDisplay = document.getElementById('wpm');
            const accuracyDisplay = document.getElementById('accuracy');
            const timerDisplay = document.getElementById('timer');

            function getNewSentence() {
                return generateText();
            }

            function updateTimer() {
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    endTest();
                    return;
                }
                timeLeft--;
            }

            function initTest() {
                // Remove previous results if they exist
                const previousResults = document.querySelector('.results-container');
                if (previousResults) {
                    previousResults.remove();
                }

                // Show typing text, keyboard, stats, and cursor
                typingText.classList.remove('hidden');
                document.querySelector('.keyboard').classList.remove('hidden');
                document.querySelector('.stats').classList.remove('hidden');
                document.getElementById('smooth-cursor').style.display = 'block';

                // Generate text instantly — no network call
                currentSentence = getNewSentence();
                currentInput = '';
                startTime = null;
                isTestActive = true;
                timeLeft = 15;
                errorChars = [];
                updateText();
                wpmDisplay.textContent = '0 wpm';
                accuracyDisplay.textContent = '0% acc';

                if (timer) {
                    clearInterval(timer);
                }
            }

            function calculateWPM(timeElapsed) {
                const words = currentInput.length / 5;
                const timeInMinutes = timeElapsed / 60000;
                return Math.round(words / timeInMinutes);
            }

            function calculateAccuracy() {
                let correct = 0;
                const inputLength = currentInput.length;
                errorChars = [];

                for (let i = 0; i < inputLength; i++) {
                    if (currentInput[i] === currentSentence[i]) {
                        correct++;
                    } else {
                        errorChars.push(currentSentence[i]);
                    }
                }

                return Math.round((correct / inputLength) * 100) || 0;
            }

            function endTest() {
                isTestActive = false;
                clearInterval(timer);

                // Get the numbers without the units
                const finalWPM = parseInt(wpmDisplay.textContent.split(' ')[0]);
                const finalAccuracy = parseInt(accuracyDisplay.textContent.split('%')[0]);

                // Update user performance with AI analysis
                updateUserPerformance(finalWPM, finalAccuracy, errorChars);

                // Hide the typing text, keyboard, bottom stats, and cursor
                typingText.classList.add('hidden');
                document.querySelector('.keyboard').classList.add('hidden');
                document.querySelector('.stats').classList.add('hidden');
                document.getElementById('smooth-cursor').style.display = 'none';

                // Create and show results with labels
                const resultsHTML = `
                    <div class="results-container">
                        <div class="result-container">
                            <div class="result-number">${finalWPM}</div>
                            <div class="result-label">wpm</div>
                        </div>
                        <div class="divider"></div>
                        <div class="result-container">
                            <div class="result-number">${finalAccuracy}%</div>
                            <div class="result-label">acc</div>
                        </div>
                    </div>
                `;

                typingText.insertAdjacentHTML('afterend', resultsHTML);
            }

            function updateText() {
                const maxCharsPerLine = 45;
                const maxVisibleLines = 3;  // Maximum number of visible lines

                const lines = [];
                let currentLine = '';
                const wordsArray = currentSentence.split(' ');

                for (let word of wordsArray) {
                    if ((currentLine + word).length > maxCharsPerLine) {
                        lines.push(currentLine.trim());
                        currentLine = word + ' ';
                    } else {
                        currentLine += word + ' ';
                    }
                }
                if (currentLine) {
                    lines.push(currentLine.trim());
                }

                let displayText = '';
                let currentPosition = 0;

                // Calculate which lines should be visible
                const currentLineIndex = lines.findIndex((line, index) => {
                    const lineStart = lines.slice(0, index).join(' ').length;
                    const lineEnd = lineStart + line.length;
                    return currentInput.length >= lineStart && currentInput.length <= lineEnd;
                });

                // Get the range of lines to display (current line and one before/after if available)
                const startIndex = Math.max(0, currentLineIndex - 1);
                const endIndex = Math.min(lines.length, startIndex + maxVisibleLines);

                const visibleLines = lines.slice(startIndex, endIndex);

                visibleLines.forEach((line, index) => {
                    let lineContent = '';
                    const absoluteLineIndex = startIndex + index;
                    const lineStart = lines.slice(0, absoluteLineIndex).join(' ').length;
                    const lineEnd = lineStart + line.length;

                    const isLineCompleted = currentInput.length > lineEnd;
                    const isLineCurrent = currentInput.length >= lineStart && currentInput.length <= lineEnd;

                    let lineClass = 'typing-line';
                    if (isLineCompleted) {
                        lineClass += ' completed';
                        if (currentInput.length > lineEnd + line.length) {
                            lineClass += ' removing';
                        }
                    }

                    lineContent += `<span class="${lineClass}">`;

                    for (let i = 0; i < line.length; i++) {
                        const charIndex = lineStart + i;

                        const isCursorHere = charIndex === currentInput.length && isLineCurrent;

                        if (charIndex < currentInput.length) {
                            if (currentInput[charIndex] === line[i]) {
                                lineContent += `<span style="color: #ffffff">${line[i]}</span>`;
                            } else {
                                lineContent += `<span style="color: #ff4444">${line[i]}</span>`;
                            }
                        } else {
                            lineContent += `<span${isCursorHere ? ' id="cursor-target"' : ''} style="color: #a6a6a6">${line[i]}</span>`;
                        }
                    }

                    lineContent += '</span>';
                    displayText += lineContent;
                });

                typingText.innerHTML = displayText;

                // Smoothly reposition the cursor
                const target = document.getElementById('cursor-target');
                const smoothCursor = document.getElementById('smooth-cursor');
                if (target && smoothCursor) {
                    const wrapperRect = typingText.parentElement.getBoundingClientRect();
                    const targetRect = target.getBoundingClientRect();
                    smoothCursor.style.left = (targetRect.left - wrapperRect.left) + 'px';
                    smoothCursor.style.top = (targetRect.top - wrapperRect.top) + 'px';
                    smoothCursor.style.height = targetRect.height + 'px';
                    smoothCursor.style.display = 'block';
                }

                if (currentInput.length > currentSentence.length - 60) {
                    currentSentence += ' ' + getNewSentence();
                }
            }

            // Add this function to clean up completed lines periodically
            function cleanupCompletedLines() {
                const completedLines = document.querySelectorAll('.typing-line.removing');
                completedLines.forEach(line => {
                    line.addEventListener('transitionend', () => {
                        line.remove();
                    });
                });
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    initTest();
                    return;
                }

                if (!isTestActive) return;

                const key = e.key.toLowerCase();
                const keyElement = document.querySelector(`[data-key="${key}"]`);

                if (keyElement) {
                    keyElement.classList.add('active');
                }

                if (!startTime && /^[a-z]$/.test(key)) {
                    startTime = Date.now();
                    timer = setInterval(updateTimer, 1000);
                }

                if (e.key === 'Backspace') {
                    e.preventDefault();
                    if (currentInput.length > 0) {
                        currentInput = currentInput.slice(0, -1);
                        updateText();
                        cleanupCompletedLines();

                        if (startTime) {
                            const timeElapsed = Date.now() - startTime;
                            const wpm = calculateWPM(timeElapsed);
                            const accuracy = calculateAccuracy();

                            wpmDisplay.textContent = `${wpm} wpm`;
                            accuracyDisplay.textContent = `${accuracy}% acc`;
                        }
                    }
                    return;
                }

                if (/^[a-z ]$/.test(key)) {
                    currentInput += key;
                    updateText();
                    cleanupCompletedLines();

                    if (startTime) {
                        const timeElapsed = Date.now() - startTime;
                        const wpm = calculateWPM(timeElapsed);
                        const accuracy = calculateAccuracy();

                        wpmDisplay.textContent = `${wpm} wpm`;
                        accuracyDisplay.textContent = `${accuracy}% acc`;
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                const keyElement = document.querySelector(`[data-key="${key}"]`);

                if (keyElement) {
                    keyElement.classList.remove('active');
                }
            });

            // Initialize the first test
            initTest();

            const toggleBtns = document.querySelectorAll('.toggle-btn');
            const keys = document.querySelectorAll('.key');

            // Set initial key shape
            keys.forEach(key => key.classList.add('round'));

            toggleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Remove active class from all buttons
                    toggleBtns.forEach(b => b.classList.remove('active'));
                    // Add active class to clicked button
                    btn.classList.add('active');

                    // Remove all shape classes from keys
                    keys.forEach(key => {
                        key.classList.remove('round', 'square', 'bordered');
                        key.classList.add(btn.dataset.shape);
                    });
                });
            });
        });
    </script>
</body>
